<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1"> <!--maximum-scale=1-->
    <title>Partial Modulator</title>

    <link rel="stylesheet" href="style.css">  
</head>

<body>

<div class="container">

    <h1>Partial Modulator</h1>

<div class="control">
    <label for="referenceA">Reference A (Hz)</label>
    <div class="a-spinner">
    <button id="aMinus">−</button>

        <input
            id="referenceA"
            type="number"
            value="443.00"
            min="300"
            max="500"
            step="1">

    <button id="aPlus">+</button>
    </div>  
</div>

<div class="control">
    <div class="fundamental-row">
        <div class="fundamental-input">
            <label for="fundamental">Current Fundamental Hz</label>
            <input
                id="fundamental"
                type="number"
                value="32.926172"
                min="0.01"
                step="0.1">
        </div>

        <div class="preview-output">

            Modulated Preview

            <span id="modulatedFundamental">
                16.463086
            </span>
        </div>
    </div>    
</div>

<div class="control">
    <div class="note-row">
        <div class="note-input">
            <label for="note">Current Fundamental Note</label>
            <input
                id="note"
                type="text"
                value="C1"
                spellcheck="false"
                autocomplete="off">
        </div>
        <div class="preview-output">

            Modulated Preview 

            <span id="modulatedNote">
            </span>
        </div>
    </div>
</div>

<div class="control">
    <label for="multiplier">Current Partial</label>
        <div class="p-spinner">
        <button id="multMinus">−</button>

            <input
                id="multiplier"
                type="number"
                min="1"
                value="1">

        <button id="multPlus">+</button>
        </div>


</div>

<div class="modulation-row">
    <label for="newPartial">New Partial</label>
        <div class="p-spinner">
        <button id="modMinus">−</button>
            <input
                id="newPartial"
                type="number"
                min="1"
                value="1">
        <button id="modPlus">+</button>
        </div>
        <div class="mod-button">
            <button id="applyModulation">
                Make Current
            </button>
        </div>

</div>

<div class="output">

    Output Current Partial

    <span id="outputFrequency">
        300 Hz
    </span>

</div>

<div class="output">

    Current Nearest Note

    <span id="nearestNote">
    </span>

</div>

<div class="control">

    <label for="volume">Volume</label>

    <input
        id="volume"
        type="range"
        min="0"
        max="100"
        value="20">

</div>

<div class="buttons">

    <button id="startButton">
        Start
    </button>

    <button id="stopButton">
        Stop
    </button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
